<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulador Mobile - Prospathia</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      :root {
        --primary: #4f46e5;
        --bg: #0f172a;
        --card: #1e293b;
        --text: #f8fafc;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background-color: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
        margin: 0;
      }
      .container {
        max-width: 600px;
        width: 100%;
        background: var(--card);
        padding: 24px;
        border-radius: 12px;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      }
      h1 {
        font-size: 1.5rem;
        margin-bottom: 20px;
        text-align: center;
        color: var(--primary);
      }
      .section {
        margin-bottom: 24px;
        padding-bottom: 16px;
        border-bottom: 1px solid #334155;
      }
      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
        font-size: 0.875rem;
      }
      input[type="text"],
      input[type="range"] {
        width: 100%;
        padding: 10px;
        background: #0f172a;
        border: 1px solid #334155;
        border-radius: 6px;
        color: white;
        margin-bottom: 12px;
        box-sizing: border-box;
      }
      button {
        width: 100%;
        padding: 12px;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        transition: opacity 0.2s;
      }
      button:hover {
        opacity: 0.9;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .log {
        background: #000;
        padding: 12px;
        height: 150px;
        overflow-y: auto;
        font-family: monospace;
        font-size: 0.75rem;
        border-radius: 6px;
        border: 1px solid #334155;
        margin-top: 20px;
      }
      .status {
        font-size: 0.75rem;
        color: #94a3b8;
        text-align: center;
        margin-bottom: 15px;
      }
      .value-display {
        font-weight: bold;
        color: var(--primary);
        font-size: 1.2rem;
        text-align: center;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Simulator Mobile - Prospathia</h1>

      <div id="status" class="status">Desconectado</div>

      <div class="section">
        <label>Seu User UID (do Desktop):</label>
        <input
          type="text"
          id="uid"
          placeholder="Cole o UID do usuário aqui..."
          value=""
        />
        <button id="connectBtn">Conectar Canais</button>
      </div>

      <div id="controls" style="display: none">
        <div class="section">
          <label>Simular Ângulo do Sensor (Pitch):</label>
          <span id="angleValue" class="value-display">0.00°</span>
          <input
            type="range"
            id="angleRange"
            min="-45"
            max="45"
            step="0.01"
            value="0"
          />
          <div class="grid">
            <button onclick="setAngle(0)">Reset (0°)</button>
            <button onclick="setAngle(15)">+15°</button>
            <button onclick="setAngle(-15)">-15°</button>
            <button onclick="setAngle(30)">+30°</button>
          </div>
        </div>

        <div class="section">
          <label>Eventos Rápidos:</label>
          <div class="grid">
            <button onclick="sendMsg('cancelar')">Cancelar</button>
            <button onclick="sendMsg('pareado')">Simular Pareio</button>
            <button onclick="sendMsg('heartbeat1')">Heartbeat</button>
          </div>
        </div>
      </div>

      <div class="log" id="log">Aguardando conexão...</div>
    </div>

    <script>
      const SUPABASE_URL = "https://ommjdrfqukmddsyblhgl.supabase.co";
      const SUPABASE_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9tbWpkcmZxdWttZGRzeWJsaGdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDE2MTQ5NTcsImV4cCI6MjA1NzE5MDk1N30.SPn8mmDUQQRodRc_GA62_DBXe165CrqIpLD40g44OB8";

      let supabase;
      let channelTela, channelMsg, channelAngulo;
      let currentUid = "";

      function log(msg, type = "info") {
        const div = document.getElementById("log");
        const line = document.createElement("div");
        line.style.color =
          type === "error"
            ? "#f87171"
            : type === "recv"
              ? "#4ad9ff"
              : "#94a3b8";
        line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        div.prepend(line);
      }

      document.getElementById("connectBtn").onclick = () => {
        const uid = document.getElementById("uid").value.trim();
        if (!uid) return alert("Insira o UID para conectar!");

        currentUid = uid;
        if (!supabase) {
          supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        }

        log(`Conectando canais para: ${uid}...`);

        // Canal de Mensagem (Mobile envia aqui)
        channelMsg = supabase.channel(`${uid}-mensagem`);

        // Canal de Tela (Mobile ouve aqui)
        channelTela = supabase
          .channel(`${uid}-tela`)
          .on("broadcast", { event: "tela" }, (payload) => {
            log(`Navegação recebida: ${payload.payload.nome}`, "recv");
          })
          .subscribe((status) => {
            if (status === "SUBSCRIBED") {
              document.getElementById("status").textContent = "Conectado";
              document.getElementById("controls").style.display = "block";
              log("Pronto para simular.");
            }
          });

        // Canal de Ângulo (Mobile ouve aqui)
        channelAngulo = supabase
          .channel(`${uid}-angulo`)
          .on("broadcast", { event: "angulo" }, (payload) => {
            log(`Calibração recebida: ${payload.payload.valor}°`, "recv");
          })
          .subscribe();

        channelMsg.subscribe();
      };

      const angleRange = document.getElementById("angleRange");
      const angleValue = document.getElementById("angleValue");

      angleRange.oninput = () => {
        const val = parseFloat(angleRange.value);
        angleValue.textContent = val.toFixed(2) + "°";
        broadcastAngle(val);
      };

      function setAngle(val) {
        angleRange.value = val;
        angleValue.textContent = val.toFixed(2) + "°";
        broadcastAngle(val);
      }

      let lastSent = 0;
      async function broadcastAngle(val) {
        const now = Date.now();
        if (now - lastSent < 50) return; // Throttling
        lastSent = now;

        if (channelMsg) {
          channelMsg.send({
            type: "broadcast",
            event: "angulodispositivo",
            payload: { valor: val },
          });
        }
      }

      async function sendMsg(text) {
        if (channelMsg) {
          log(`Enviando mensagem: ${text}`);
          channelMsg.send({
            type: "broadcast",
            event: "mensagem",
            payload: { valor: text },
          });
        }
      }
    </script>
  </body>
</html>
